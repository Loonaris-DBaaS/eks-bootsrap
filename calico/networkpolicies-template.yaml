# Baseline cluster policy for DNS namespace: explicit allow model
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: kube-system
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

---
# Per-tenant policy: apply this template once per tenant namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: tenant-isolation
  namespace: ${TENANT_NS}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow pod-to-pod traffic inside the same tenant namespace
    - from:
        - podSelector: {}
    # Allow SNI router to connect to PostgreSQL endpoint
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: sni-router
      ports:
        - protocol: TCP
          port: 5432
  egress:
    # Allow internal traffic in the tenant namespace
    - to:
        - podSelector: {}
    # Allow DNS resolution to CoreDNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

---
# Explicit tenant cross-namespace deny guard
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-cross-tenant
  namespace: ${TENANT_NS}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    # Allow only pods from the same namespace
    - from:
        - podSelector: {}

---
# SNI router egress policy (single deployment)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: sni-router-egress
  namespace: sni-router
spec:
  podSelector:
    matchLabels:
      app: sni-router
  policyTypes:
    - Egress
  egress:
    - ports:
        - protocol: TCP
          port: 5432
